<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pendaftaran Anggota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <a href="./index.html" class="btn btn-secondary mb-3">Kembali ke Home</a> <!--menyambungkan form pendaftaran ke dashboard utama -->
        <div class="card p-4 shadow">
            <h3>Form Pendaftaran Anggota</h3>
            <form id="registrationForm">
                <div class="mb-3">
                    <label class="form-label">Nama Lengkap</label> <!--menambahkan slot nama lengkap-->
                    <input type="text" id="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label> <!--menambahkan slot email-->
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Bidang Minat</label> <!--membuat code memilih pilihan bidang minat-->
                    <select id="interest" class="form-select">
                        <option value="Web Development">Web Development</option>
                        <option value="Mobile Development">Mobile Development</option>
                        <option value="Data Science">Data Science</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success w-100">Daftar</button>
            </form>
            <div id="result" class="mt-4 p-3 border d-none bg-light"></div>
        </div>
    </div>

    <script>
        const members = [];
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const member = {
                nama: document.getElementById('name').value,
                email: document.getElementById('email').value,
                minat: document.getElementById('interest').value
            };

            members.push(member); //menyimpan ke array
            alert('Data berhasil disimpan!');

            //menampilkan tampilan dibawah form
            const resultDiv = document.getElementById('result');
            resultDiv.classList.remove('d-none');
            resultDiv.innerHTML = `<strong>Hasil Input:</strong><br>Nama: ${member.nama}<br>Email: ${member.email}<br>Minat: ${member.minat}`;
        });
    </script>
</body>
</html>
